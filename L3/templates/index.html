<!DOCTYPE html>
<html>
<head>
    <title>AI Recipe Generator</title>
    <link rel="stylesheet" href="/public/style.css">
</head>
<body>

    <h1>Recipe Generator</h1>

    <p>Enter ingredients:</p>

    <input type="text" id="ingredients" placeholder="Ingredients (comma separated)">
    <input type="text" id="cuisine" placeholder="Cuisine type (optional)">
    <input type="text" id="diet" placeholder="Dietary preference (optional)">
    <input type="number" id="maxTime" placeholder="Max time in minutes (optional)">
    <button onclick="generateRecipe()">Generate Recipe</button>

    <div id="result"></div>

    <script>
        async function generateRecipe() {
            const ingredients = document.getElementById("ingredients").value;
            const cuisine = document.getElementById("cuisine").value.trim() || null;
            const diet = document.getElementById("diet").value.trim() || null;
            const maxTimeInput = document.getElementById("maxTime").value;
            const maxTime = maxTimeInput ? parseInt(maxTimeInput, 10) : null;

            const response = await fetch("http://localhost:5001/generate", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    ingredients: ingredients,
                    cuisine: cuisine,
                    diet: diet,
                    max_time: maxTime
                })
            });

            const data = await response.json();

            document.getElementById("result").innerText = data.recipe;
        }
    </script>

</body>
</html>
